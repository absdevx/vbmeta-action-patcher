name: Patch All VBMeta - Spreadtrum chip

on:
  workflow_dispatch:
    inputs:
      ARCHITECTURE:
        description: 'Architecture du binaire de patch'
        required: true
        default: 'x86_64'
        type: choice
        options:
        - x86_64
        - x86
        - arm64-v8a
        - armeabi-v7a

permissions:
  contents: write

jobs:
  patch_vbmeta:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-latest
    steps:

    - name: Check Out
      uses: actions/checkout@v4

    - name: System Information
      run: uname -a

    - name: Verify Patch Binary
      run: |
        PATCHER="${{ github.event.inputs.ARCHITECTURE }}/vbmeta-disable-verification"
        if [ ! -f "$PATCHER" ]; then
          echo "Binaire de patch introuvable : $PATCHER"
          exit 1
        fi
        file "$PATCHER"
        chmod +x "$PATCHER"

    - name: Locate All VBMeta Images
      run: |
        echo "Recherche de toutes les images vbmeta dans le repo..."
        VBMETA_FILES=$(find . -type f -iname "vbmeta*.img" | sort)

        if [ -z "$VBMETA_FILES" ]; then
          echo "Aucune image vbmeta trouvée dans le repo !"
          exit 1
        fi

        echo "Images vbmeta trouvées :"
        echo "$VBMETA_FILES"
        echo "$VBMETA_FILES" > vbmeta_list.txt

    - name: Patch All VBMeta Images
      run: |
        PATCHER="${{ github.event.inputs.ARCHITECTURE }}/vbmeta-disable-verification"
        mkdir -p vbmeta_patched
        SUCCESS=0
        FAIL=0

        while read -r IMGPATH; do
          IMGNAME=$(basename "$IMGPATH")
          DEST="vbmeta_patched/$IMGNAME"
          cp "$IMGPATH" "$DEST"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Patching : $IMGNAME"
          if ./"$PATCHER" "$DEST"; then
            echo "✓ Succès : $IMGNAME"
            SUCCESS=$((SUCCESS + 1))
          else
            echo "✗ Échec  : $IMGNAME"
            FAIL=$((FAIL + 1))
          fi
        done < vbmeta_list.txt

        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "Résultat : $SUCCESS patchés avec succès, $FAIL échoués"
        ls -lh vbmeta_patched/

        if [ "$SUCCESS" -eq 0 ]; then
          echo "Aucune image patchée avec succès !"
          exit 1
        fi

        # Sauvegarde les noms seuls pour la release
        ls vbmeta_patched/ > vbmeta_names.txt

    - name: Upload to Release
      uses: ncipollo/release-action@v1.14.0
      with:
        artifacts: "vbmeta_patched/*.img"
        name: "Patched VBMeta — Tecno KM4 SPRD"
        draft: false
        prerelease: true
        tag: "vbmeta-km4-${{ github.run_id }}"
        token: ${{ secrets.GITHUB_TOKEN }}
        body: |
          ## Images vbmeta patchées — Tecno KM4 SPRD

          Flashez chaque image sur sa partition via fastboot :
          fastboot flash vbmeta vbmeta.img
          fastboot flash vbmeta_system vbmeta_system.img
          fastboot flash vbmeta_vendor vbmeta_vendor.img